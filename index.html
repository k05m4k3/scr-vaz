<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SCR Intelligence</title>
<style>
body {
  margin:0;
  font-family: Inter, Arial;
  background:#0f172a;
  color:#e2e8f0;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container {
  text-align:center;
}

h1 {
  margin-bottom:30px;
}

.card {
  background:#020617;
  padding:30px;
  border-radius:12px;
  margin:10px;
  display:inline-block;
  cursor:pointer;
  transition:0.2s;
  width:220px;
}

.card:hover {
  transform:translateY(-5px);
  background:#1e293b;
}

.title {
  font-size:18px;
  font-weight:600;
}

.desc {
  font-size:13px;
  color:#94a3b8;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="container">
  <h1>SCR Intelligence Platform</h1>

  <div class="card" onclick="go('pf.html')">
    <div class="title">PF - Empréstimos</div>
    <div class="desc">Análise de crédito pessoa física</div>
  </div>

  <div class="card" onclick="go('pj.html')">
    <div class="title">PJ</div>
    <div class="desc">Análise de crédito pessoa jurídica</div>
  </div>
</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
